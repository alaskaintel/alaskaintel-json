name: Alaska Intel - Native Sector

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  pipeline:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/alaskaintel/alaskaintel-json/alaskaintel-pipeline:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout alaskaintel-data
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch Native RSS
        env:
          INGEST_SECRET: ${{ secrets.INGEST_SECRET }}
        run: |
          python3 pipelines/monitor_feeds.py
          python3 pipelines/fetch_intel.py --category native

      - name: Commit + Push Data
        id: git_sync
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git config --global user.name "AlaskaIntel-Bot"
          git config --global user.email "bot@alaskaintel.com"
          git add data/ public/ || true
          
          if ! git diff --staged --quiet; then
            git commit -m "intel: native sector sync $(date -u +'%Y-%m-%d %H:%M UTC')"
            for i in 1 2 3 4 5; do
              git pull --rebase origin master
              if git push origin master; then break; fi
              sleep 5
            done
            echo "HAS_CHANGES=true" >> $GITHUB_OUTPUT
          else
            echo "HAS_CHANGES=false" >> $GITHUB_OUTPUT
          fi

