name: Alaska Intel - MMIP Sector

on:
  schedule:
    # Run daily at 14:30 UTC and 15:30 UTC (6:30 AM and 7:30 AM Alaska Time depending on Daylight Savings)
    # This guarantees we capture the state DPS daily 6:00 AM database refresh.
    - cron: '30 14,15 * * *'
  workflow_dispatch:
  push:
    paths:
      - 'scripts/fetch_missing_persons.py'

concurrency:
  group: pipeline-mmip
  cancel-in-progress: false

jobs:
  pipeline:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/kb907alaska/alaskaintel-data/alaskaintel-pipeline:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout alaskaintel-data
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch Official DPS Missing Persons Database
        run: |
          python3 scripts/fetch_missing_persons.py

      - name: Commit + Push Data
        id: git_sync
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git config --global user.name "AlaskaIntel-Bot"
          git config --global user.email "bot@alaskaintel.com"
          git add data/ public/ || true
          
          if ! git diff --staged --quiet; then
            git commit -m "intel: missing persons sector sync $(date -u +'%Y-%m-%d %H:%M UTC')"
            for i in 1 2 3 4 5; do
              git pull --rebase origin master
              if git push origin master; then break; fi
              sleep 5
            done
            echo "HAS_CHANGES=true" >> $GITHUB_OUTPUT
          else
            echo "HAS_CHANGES=false" >> $GITHUB_OUTPUT
          fi

      - name: Sync to R2 (data.alaskaintel.com)
        if: steps.git_sync.outputs.HAS_CHANGES == 'true'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
        run: |
          R2_EP="https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com"
          aws s3 sync data/ s3://alaskaintel-data/ --endpoint-url "$R2_EP" --exclude "*" --include "*.json" --content-type "application/json" --cache-control "no-cache, max-age=0"
          if [ -d "public" ]; then
            aws s3 sync public/ s3://alaskaintel-data/ --endpoint-url "$R2_EP" --exclude "*" --include "*.json" --content-type "application/json" --cache-control "no-cache, max-age=0"
          fi
