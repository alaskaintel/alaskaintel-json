name: "🔄 Pipeline Med (1hr)"

on:
  schedule:
    - cron: "0 * * * *"   # Every hour — native, regional, health
  repository_dispatch:
    types: [cloudflare-med-trigger]
  workflow_dispatch:

concurrency:
  group: pipeline-med
  cancel-in-progress: false

jobs:
  pipeline:
    name: "Core RSS + Safety Scrapers"
    runs-on: ubuntu-latest
    timeout-minutes: 45
    container:
      image: ghcr.io/kb907alaska/alaskaintel-data/alaskaintel-pipeline:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - name: Core RSS Aggregator
        env:
          INGEST_SECRET: ${{ secrets.INGEST_SECRET }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: python3 scripts/fetch_intel.py --priority=medium --category=Native,Regional,Health,Fisheries,Research

      - name: Safety Scrapers
        run: |
          python3 scripts/scrape_ast.py        || echo "⚠️ AST failed"
          python3 scripts/fetch_earthquakes.py || echo "⚠️ Earthquakes failed"
          python3 scripts/fetch_wildfires.py   || echo "⚠️ Wildfires failed"
          python3 scripts/fetch_weather.py     || echo "⚠️ Weather failed"

      - name: Commit + Push
        id: git_sync
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git config --global user.name "AlaskaIntel-Bot"
          git config --global user.email "bot@alaskaintel.com"
          git add data/ public/ || true
          if ! git diff --staged --quiet; then
            git commit -m "intel: [med] RSS + safety sync $(date -u +'%H:%M UTC')"
            for i in 1 2 3 4 5; do
              git pull --rebase origin master
              if git push origin master; then break; fi
              sleep 5
            done
            echo "HAS_CHANGES=true" >> $GITHUB_OUTPUT
          else
            echo "HAS_CHANGES=false" >> $GITHUB_OUTPUT
          fi

      - name: Sync to R2
        if: steps.git_sync.outputs.HAS_CHANGES == 'true'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
        run: |
          R2_EP="https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com"
          aws s3 sync data/ s3://alaskaintel-data/ --endpoint-url "$R2_EP" --exclude "*" --include "*.json" --content-type "application/json" --cache-control "no-cache, max-age=0"
          if [ -d "public" ]; then
            aws s3 sync public/ s3://alaskaintel-data/ --endpoint-url "$R2_EP" --exclude "*" --include "*.json" --content-type "application/json" --cache-control "no-cache, max-age=0"
            aws s3 sync public/ s3://alaskaintel-data/ --endpoint-url "$R2_EP" --exclude "*" --include "*.xml"  --content-type "application/xml"  --cache-control "no-cache, max-age=0"
          fi
