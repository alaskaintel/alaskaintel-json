name: "⚡⚡ Pipeline Super Fast (15min)"

on:
  schedule:
    - cron: "*/15 * * * *"   # Every 15 min — breaking intel only
  repository_dispatch:
    types: [cloudflare-super-fast-trigger]
  workflow_dispatch:

concurrency:
  group: pipeline-super-fast
  cancel-in-progress: false

jobs:
  pipeline:
    name: "Breaking Intel — Emergency + Core RSS"
    runs-on: ubuntu-latest
    timeout-minutes: 12
    container:
      image: ghcr.io/kb907alaska/alaskaintel-data/alaskaintel-pipeline:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - name: Emergency scrapers
        env:
          AK511_API_KEY: ${{ secrets.AK511_API_KEY }}
          INGEST_SECRET: ${{ secrets.INGEST_SECRET }}
        run: |
          python3 scripts/fetch_intel.py --priority=high --category=Emergency,Safety,Weather || echo "⚠️ Core failed"
          python3 scripts/fetch_earthquakes.py || echo "⚠️ Earthquakes failed"
          python3 scripts/fetch_weather.py     || echo "⚠️ Weather failed"
          python3 scripts/fetch_wildfires.py   || echo "⚠️ Wildfires failed"
          python3 scripts/fetch_511ak.py       || echo "⚠️ 511AK failed"
          python3 scripts/fetch_nws_cap.py     || echo "⚠️ NWS CAP failed"
          python3 scripts/fetch_volcanoes.py   || echo "⚠️ Volcanoes failed"

      - name: Commit + Push
        id: git_sync
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git config --global user.name "AlaskaIntel-Bot"
          git config --global user.email "bot@alaskaintel.com"
          git add data/ public/ || true
          if ! git diff --staged --quiet; then
            git commit -m "intel: [super-fast] emergency sync $(date -u +'%H:%M UTC')"
            for i in 1 2 3 4 5; do
              git pull --rebase origin main
              if git push origin main; then break; fi
              sleep 5
            done
            echo "HAS_CHANGES=true" >> $GITHUB_OUTPUT
          else
            echo "HAS_CHANGES=false" >> $GITHUB_OUTPUT
          fi

      - name: Sync to R2
        if: steps.git_sync.outputs.HAS_CHANGES == 'true'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
        run: |
          R2_EP="https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com"
          aws s3 sync data/ s3://alaskaintel-data/ --endpoint-url "$R2_EP" --exclude "*" --include "*.json" --content-type "application/json" --cache-control "no-cache, max-age=0"
